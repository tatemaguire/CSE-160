<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Block Animal</title>
</head>
<body onload="main()">
    <canvas id="webgl" width="400" height="400">
        Please use a browser that supports "canvas".
    </canvas>
    <br>

    <p>
        This is an Ankylosaurus!
    </p>

    <h3>Global Rotation</h3>
    <input type="range" id="globalRotationInput" min="-180" max="180" value="0">

    <h3>Thigh Joint</h3>
    <input type="range" id="thighJointInput" min="-75" max="75" value="0">

    <h3>Calf Joint</h3>
    <input type="range" id="calfJointInput" min="-75" max="75" value="0">

    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix.js"></script>
    <script src="./BlockyAnimal.js"></script>
</body>
</html>
